services:
  - type: web
    name: budget-lens-api
    env: python
    region: singapore
    plan: free
    rootDir: apps/api
    pythonVersion: 3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: budget-lens-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "https://budget-lens.vercel.app"
    healthCheckPath: /health

databases:
  - name: budget-lens-db
    plan: free
    region: singapore
